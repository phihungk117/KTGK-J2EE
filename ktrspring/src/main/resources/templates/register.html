<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: var(--background-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="container animate-fade-in py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
                <h2 class="fw-bold mt-2">Tạo Tài Khoản</h2>
                <p class="text-muted">Đăng ký để ghi danh học phần</p>
            </div>
            
            <div class="glass-card p-4 p-md-5">
                <!-- Validation Global Errors (Optional if we mapped to fields) -->
                <div th:if="${error}" class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <div th:text="${error}"></div>
                </div>
                
                <form th:action="@{/register}" th:object="${student}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-bold small text-muted text-uppercase">Tên đăng nhập</label>
                        <div class="input-group has-validation">
                            <span class="input-group-text bg-white"><i class="bi bi-person text-secondary"></i></span>
                            <input type="text" class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''" id="username" th:field="*{username}" placeholder="Nhập username">
                            <div class="invalid-feedback fw-medium" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Lỗi</div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold small text-muted text-uppercase">Email liên hệ</label>
                        <div class="input-group has-validation">
                            <span class="input-group-text bg-white"><i class="bi bi-envelope text-secondary"></i></span>
                            <input type="text" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" id="email" th:field="*{email}" placeholder="name@example.com">
                            <div class="invalid-feedback fw-medium" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Lỗi</div>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold small text-muted text-uppercase">Mật khẩu bảo mật</label>
                        <div class="input-group has-validation">
                            <span class="input-group-text bg-white"><i class="bi bi-lock text-secondary"></i></span>
                            <input type="password" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" id="password" th:field="*{password}" placeholder="Tạo mật khẩu">
                            <div class="invalid-feedback fw-medium" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Lỗi</div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-gradient-primary w-100 py-2 mb-3">
                        Xác Nhận Đăng Ký <i class="bi bi-check-circle ms-1"></i>
                    </button>
                    
                    <div class="text-center mt-4 border-top pt-3">
                        <span class="text-muted">Đã có tài khoản?</span> 
                        <a th:href="@{/login}" class="text-decoration-none fw-bold text-success">Đăng nhập</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
