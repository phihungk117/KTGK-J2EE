<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Tài Khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: var(--background-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="container animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <i class="bi bi-mortarboard-fill text-primary" style="font-size: 3rem;"></i>
                <h2 class="fw-bold mt-2">Edu Portal</h2>
                <p class="text-muted">Đăng nhập để tiếp tục</p>
            </div>
            
            <div class="glass-card p-4 p-md-5">
                <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <div>Sai tên đăng nhập hoặc mật khẩu!</div>
                </div>
                <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <div>Đã đăng xuất thành công.</div>
                </div>
                <div th:if="${param.registered}" class="alert alert-info d-flex align-items-center" role="alert">
                    <i class="bi bi-info-circle-fill me-2"></i>
                    <div>Đăng ký thành công, vui lòng đăng nhập!</div>
                </div>
                
                <form th:action="@{/login}" method="post">
                    <div class="mb-4">
                        <label for="username" class="form-label fw-bold small text-muted text-uppercase">Tên đăng nhập</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-person text-primary"></i></span>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Nhập username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold small text-muted text-uppercase">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-lock text-primary"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Nhập password" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-gradient-primary w-100 py-2 mb-3">
                        Đăng Nhập <i class="bi bi-box-arrow-in-right ms-1"></i>
                    </button>
                    
                    <div class="text-center mt-4">
                        <span class="text-muted">Chưa có tài khoản?</span> 
                        <a th:href="@{/register}" class="text-decoration-none fw-bold">Đăng ký ngay</a>
                    </div>
                    <div class="text-center mt-2">
                        <a th:href="@{/}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left mt-1"></i> Quay lại trang chủ</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
