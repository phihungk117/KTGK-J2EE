<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu Mẫu Khóa Học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5 sticky-top shadow-sm" style="background: linear-gradient(135deg, #1f2937 0%, #111827 100%) !important;">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/admin/courses">
            <i class="bi bi-shield-lock-fill text-warning me-2 fs-3"></i> 
            <span class="fw-bold">Admin Panel</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link text-white fw-bold px-3 active" href="/admin/courses"><i class="bi bi-grid-fill me-1"></i> Quản lý Học Phần</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white-50 px-3" href="/admin/users"><i class="bi bi-people-fill me-1"></i> Quản lý Tài Khoản</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white-50 px-3" href="/"><i class="bi bi-house-door-fill me-1"></i> Giao diện User</a>
                </li>
                <li class="nav-item ms-lg-2">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-warning rounded-pill px-4 btn-sm fw-bold"><i class="bi bi-box-arrow-right me-1"></i> Đăng xuất</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container animate-fade-in mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a th:href="@{/admin/courses}" class="text-decoration-none">Quản lý Học Phần</a></li>
                        <li class="breadcrumb-item active" aria-current="page" th:text="${course.id != null ? 'Chỉnh Sửa' : 'Thêm Mới'}">Thêm Mới</li>
                    </ol>
                </nav>
            </div>

            <div class="glass-card shadow-sm border-0">
                <div class="card-header bg-white border-bottom py-3 d-flex align-items-center">
                    <div class="bg-primary text-white p-2 rounded me-3 shadow-sm">
                        <i class="bi bi-pencil-square fs-5"></i>
                    </div>
                    <h4 class="mb-0 fw-bold" th:text="${course.id != null ? 'Cập Nhật Khóa Học #' + course.id : 'Thêm Khóa Học Mới'}">Thêm Khóa Học</h4>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/admin/courses/save}" th:object="${course}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:field="*{id}" />

                        <div class="row g-4 mb-4">
                            <div class="col-12">
                                <label for="name" class="form-label fw-bold text-secondary small text-uppercase">Tên học phần <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-book text-muted"></i></span>
                                    <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="Nhập tên khóa học" required>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <label for="credits" class="form-label fw-bold text-secondary small text-uppercase">Số tín chỉ <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-123 text-muted"></i></span>
                                    <input type="number" class="form-control" id="credits" th:field="*{credits}" min="1" max="10" placeholder="VD: 3" required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="lecturer" class="form-label fw-bold text-secondary small text-uppercase">Giảng viên <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-person-video3 text-muted"></i></span>
                                    <input type="text" class="form-control" id="lecturer" th:field="*{lecturer}" placeholder="Tên giảng viên" required>
                                </div>
                            </div>

                            <div class="col-12">
                                <label for="imageFile" class="form-label fw-bold text-secondary small text-uppercase">Ảnh Minh Họa</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-image text-muted"></i></span>
                                    <input type="file" class="form-control" id="imageFile" name="imageFile" accept="image/png, image/jpeg, image/jpg">
                                </div>
                                <div class="form-text mt-2" th:if="${course.image != null and !course.image.empty}">
                                    <i class="bi bi-check-circle-fill text-success me-1"></i> Đã có ảnh: <a th:href="${course.image}" target="_blank">Xem ảnh hiện tại</a>. Chọn file mới để ghi đè.
                                </div>
                                <div class="form-text mt-2" th:unless="${course.image != null and !course.image.empty}">
                                    <i class="bi bi-info-circle me-1"></i> Tải lên 1 bức ảnh từ máy tính (PNG, JPG). Để trống sẽ dùng ảnh mặc định.
                                </div>
                            </div>

                            <div class="col-12">
                                <label for="category" class="form-label fw-bold text-secondary small text-uppercase">Danh mục</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-tags text-muted"></i></span>
                                    <select class="form-select" id="category" th:field="*{category.id}">
                                        <option th:each="cat : ${listCategories}" 
                                                th:value="${cat.id}" 
                                                th:text="${cat.name}">Danh mục</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <hr class="text-muted opacity-25 mb-4 border-2">
                        
                        <div class="d-flex justify-content-end gap-3">
                            <a th:href="@{/admin/courses}" class="btn btn-light border px-4 rounded-pill fw-medium">Hủy bỏ</a>
                            <button type="submit" class="btn btn-gradient-primary px-4 rounded-pill shadow-sm">
                                <i class="bi bi-save me-1"></i> Lưu Thay Đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
